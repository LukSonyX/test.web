<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vozy na Prodej | Sky Cars</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="img/logo.svg" alt="Sky Cars Logo">
            </a>
            <nav>
                <a href="index.html">Domů</a>
                <a href="vozy.html" class="active">Vozy na Prodej</a>
                <a href="sluzby.html">Služby</a>
                <a href="onas.html">O Nás</a>
                <a href="kontakt.html">Kontakt</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1>Aktuální Nabídka Vozů</h1>
                <p>Prohlédněte si naše prémiové vozy skladem. Všechna auta jsou pečlivě prověřena.</p>
            </div>
        </section>

        <section class="car-grid-section">
            <div class="container car-grid" id="car-list">
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-inner">
            <p style="color: #666;">© 2026 Sky Cars. Všechna práva vyhrazena.</p>
        </div>
    </footer>

    <script>
        async function nactiAuta() {
            try {
                const response = await fetch('data/auta.json');
                const auta = await response.json();
                
                const kontejner = document.getElementById('car-list');
                kontejner.innerHTML = '';

                auta.forEach(auto => {
                    const htmlKarty = `
                        <div class="car-card">
                            <img src="${auto.obrazek}" alt="${auto.nazev}">
                            <div class="car-info">
                                <h3>${auto.nazev}</h3>
                                <div class="price">${auto.cena}</div>
                                <ul class="specs">
                                    <li><i class="fa-regular fa-calendar"></i> ${auto.rok}</li>
                                    <li><i class="fa-solid fa-gauge-high"></i> ${auto.najeto}</li>
                                    <li><i class="fa-solid fa-gas-pump"></i> ${auto.palivo}</li>
                                </ul>
                                <a href="#" class="btn btn-primary btn-block">Detail vozu</a>
                            </div>
                        </div>
                    `;
                    kontejner.innerHTML += htmlKarty;
                });
            } catch (error) {
                console.error("Nepodařilo se načíst auta:", error);
                document.getElementById('car-list').innerHTML = '<p>Načítání nabídky vozů se nezdařilo. Zkuste to prosím později.</p>';
            }
        }

        nactiAuta();
    </script>
</body>
</html>
